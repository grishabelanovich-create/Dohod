<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📋 Плановый бюджет</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 16px;
            color: #1e293b;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .title {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 4px 0;
            color: #1e293b;
        }
        
        .subtitle {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 16px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .section-title {
            font-size: 17px;
            font-weight: 700;
            margin: 0;
            color: #1e293b;
        }
        
        .collapse-btn {
            background: #f1f5f9;
            border: none;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: #475569;
        }
        
        .plan-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        .plan-table th, .plan-table td {
            padding: 10px 4px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .plan-table th {
            font-weight: 700;
            color: #475569;
            background: #f8fafc;
        }
        
        .category-name {
            font-weight: 700;
            color: #1e293b;
        }
        
        .plan-amount {
            font-weight: 700;
            color: #1e293b;
        }
        
        .edit-btn {
            background: none;
            border: none;
            font-size: 15px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            color: #94a3b8;
        }
        
        .edit-btn:active {
            background: #e2e8f0;
        }
        
        .actual-paid {
            font-weight: 700;
            color: #1e293b;
        }
        
        .status-loading {
            color: #f59e0b;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            font-size: 10px;
        }
        
        .status-closed {
            color: #10b981;
            font-weight: 700;
            font-size: 10px;
        }
        
        .progress-bar-bg {
            background: #e2e8f0;
            border-radius: 10px;
            height: 5px;
            width: 100%;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            background: #10b981;
            height: 5px;
            border-radius: 10px;
            width: 0%;
        }
        
        .input-group {
            margin-bottom: 14px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #334155;
        }
        
        input, select {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: white;
            font-family: inherit;
            color: #1e293b;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .row-2 {
            display: flex;
            gap: 12px;
        }
        
        .row-2 .input-group {
            flex: 1;
        }
        
        button {
            cursor: pointer;
            transition: 0.1s;
            border: none;
            font-family: inherit;
        }
        
        button:active {
            transform: scale(0.97);
        }
        
        .btn-add {
            background: #3b82f6;
            color: white;
            padding: 13px;
            border-radius: 40px;
            width: 100%;
            margin-top: 5px;
            font-weight: 600;
            font-size: 15px;
        }
        
        .btn-excel {
            background: #10b981;
            color: white;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            margin-top: 10px;
            font-weight: 600;
        }
        
        .btn-chart {
            background: #8b5cf6;
            color: white;
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            margin-top: 10px;
            font-weight: 600;
        }
        
        .total-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .total-row:last-child {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
            margin-top: 5px;
            font-size: 18px;
            font-weight: 700;
        }
        
        .trans-list {
            max-height: 280px;
            overflow-y: auto;
        }
        
        .trans-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .trans-cat {
            font-weight: 700;
            font-size: 13px;
            color: #1e293b;
        }
        
        .trans-date {
            font-size: 10px;
            color: #94a3b8;
        }
        
        .trans-amt {
            font-weight: 700;
        }
        
        .del-btn {
            background: none;
            border: none;
            font-size: 16px;
            margin-left: 10px;
            color: #cbd5e1;
        }
        
        .clear-btn {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            margin-top: 12px;
            color: #64748b;
            font-size: 13px;
        }
        
        .empty {
            text-align: center;
            padding: 25px;
            color: #94a3b8;
            font-size: 13px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }
        
        .modal-content {
            background: white;
            border-radius: 28px;
            margin: 20px;
            padding: 20px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .close-modal {
            background: #f1f5f9;
            border: none;
            font-size: 22px;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        
        .stat-card {
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: 800;
        }
        
        canvas {
            max-height: 200px;
            margin: 15px 0;
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 550px) {
            body { padding: 12px; }
            .plan-table th, .plan-table td { font-size: 11px; }
        }
    </style>
    <!-- Chart.js и SheetJS через CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="title">📋 Плановый бюджет</div>
        <div class="subtitle">✏️ Нажмите на карандаш, чтобы изменить план</div>
    </div>

    <!-- Основные расходы -->
    <div class="card">
        <div class="section-header"><div class="section-title">🎯 Основные расходы</div></div>
        <table class="plan-table"><thead><tr><th>📂 Категория</th><th>🎯 План</th><th>💰 Потрачено</th><th>📊 Статус</th><th></th></tr></thead>
        <tbody id="mainBody"></tbody></table>
    </div>

    <!-- Дополнительные расходы -->
    <div class="card">
        <div class="section-header"><div class="section-title">✨ Дополнительные расходы</div>
        <button class="collapse-btn" id="collapseBtn">▼ Свернуть</button></div>
        <div id="extraContainer"><table class="plan-table"><thead><tr><th>📂 Категория</th><th>🎯 План</th><th>💰 Потрачено</th><th>📊 Статус</th><th></th></tr></thead>
        <tbody id="extraBody"></tbody></table></div>
    </div>

    <!-- Итоги -->
    <div class="total-card">
        <div class="total-row"><span>💰 Доходы</span><span id="totalInc">0 ₽</span></div>
        <div class="total-row"><span>📉 Расходы</span><span id="totalExp">0 ₽</span></div>
        <div class="total-row"><span>💎 Остаток</span><span id="balance">0 ₽</span></div>
    </div>

    <!-- Форма добавления -->
    <div class="card">
        <div style="font-weight:700; margin-bottom:14px;">➕ Добавить операцию</div>
        <div class="row-2">
            <div class="input-group"><label>📅 Дата</label><input type="date" id="date"></div>
            <div class="input-group"><label>💰 Сумма</label><input type="number" id="amount" placeholder="0"></div>
        </div>
        <div class="input-group">
            <label>📂 Категория</label>
            <select id="catSelect">
                <optgroup label="💰 Доходы"><option>💰 Зарплата</option><option>➕ Дополнительный доход</option></optgroup>
                <optgroup label="📉 Основные расходы"><option>🍎 Еда</option><option>📄 Налог</option><option>🚌 Интернет и проезд</option><option>💡 ЖКХ</option><option>📦 Прочие расходы</option><option>🏦 Вклад</option></optgroup>
                <optgroup label="✨ Дополнительные"><option>☕ Кафе и обеды</option><option>🐩 Содержание королевского пуделя</option><option>📦 Маркетплейсы</option><option>💄 Красота</option><option>💊 Здоровье</option></optgroup>
            </select>
        </div>
        <div class="row-2">
            <div class="input-group"><label>🟢 Тип</label><select id="type"><option value="income">Доход (+)</option><option value="expense">Расход (-)</option></select></div>
            <div class="input-group"><label>📝 Коммент</label><input type="text" id="comment" placeholder="..."></div>
        </div>
        <button class="btn-add" id="addBtn">+ Добавить запись</button>
        <button class="btn-excel" id="excelBtn">📥 Скачать Excel</button>
        <button class="btn-chart" id="chartBtn">📊 График динамики</button>
    </div>

    <!-- История -->
    <div class="card">
        <div class="section-header"><div class="section-title">📜 История операций</div></div>
        <div id="historyList" class="trans-list"><div class="empty">📭 Нет операций</div></div>
        <button class="clear-btn" id="clearBtn">🗑️ Очистить всё</button>
    </div>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal"><div class="modal-content"><div class="modal-header"><span style="font-weight:700">📊 График</span><button class="close-modal" id="closeModal">✕</button></div><div id="modalBody"></div></div></div>

<script>
    // ========== ДАННЫЕ ==========
    let mainPlans = [
        { name: "🍎 Еда", plan: 25000 }, { name: "📄 Налог", plan: 2500 }, 
        { name: "🚌 Интернет и проезд", plan: 2500 }, { name: "💡 ЖКХ", plan: 10000 },
        { name: "📦 Прочие расходы", plan: 8000 }, { name: "🏦 Вклад", plan: 35000 }
    ];
    let extraPlans = [
        { name: "☕ Кафе и обеды", plan: 100 }, { name: "🐩 Содержание королевского пуделя", plan: 100 },
        { name: "📦 Маркетплейсы", plan: 100 }, { name: "💄 Красота", plan: 100 }, 
        { name: "💊 Здоровье", plan: 100 }
    ];
    let transactions = [];
    let extraCollapsed = false;
    let chart = null;

    // ========== ЗАГРУЗКА ==========
    function loadAll() {
        try {
            let m = localStorage.getItem('mainPlans'); if (m) mainPlans = JSON.parse(m);
            let e = localStorage.getItem('extraPlans'); if (e) extraPlans = JSON.parse(e);
            let t = localStorage.getItem('transactions'); if (t) transactions = JSON.parse(t);
        } catch(e) {}
        
        if (!transactions.length) {
            let today = new Date().toISOString().slice(0,10);
            transactions = [
                { id: Date.now(), date: today, amount: 75000, category: "💰 Зарплата", type: "income", comment: "" },
                { id: Date.now()+1, date: today, amount: 5000, category: "🍎 Еда", type: "expense", comment: "Продукты" },
                { id: Date.now()+2, date: today, amount: 2500, category: "📄 Налог", type: "expense", comment: "" }
            ];
        }
        saveAll();
        render();
    }
    
    function saveAll() {
        try {
            localStorage.setItem('mainPlans', JSON.stringify(mainPlans));
            localStorage.setItem('extraPlans', JSON.stringify(extraPlans));
            localStorage.setItem('transactions', JSON.stringify(transactions));
        } catch(e) {}
    }

    // ========== ПОМОЩНИКИ ==========
    function getSpent(cat) {
        return transactions.filter(t => t.type === 'expense' && t.category === cat).reduce((s, t) => s + t.amount, 0);
    }
    function getTotalIncome() { return transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0); }
    function getTotalExpense() { return transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0); }
    function getToday() { return new Date().toISOString().slice(0,10); }

    // ========== РЕДАКТИРОВАНИЕ ==========
    function editPlan(name, isMain) {
        let arr = isMain ? mainPlans : extraPlans;
        let item = arr.find(i => i.name === name);
        if (!item) return;
        let newVal = prompt(`✏️ Изменить план для "${name}":`, item.plan);
        if (newVal && !isNaN(parseFloat(newVal)) && parseFloat(newVal) > 0) {
            item.plan = parseFloat(newVal);
            saveAll();
            render();
        } else if (newVal) alert("❌ Введите число больше 0");
    }

    // ========== ОТРИСОВКА ==========
    function renderTable(plans, isMain, tbodyId) {
        let html = '';
        for (let p of plans) {
            let spent = getSpent(p.name);
            let percent = Math.min(100, (spent / p.plan) * 100);
            let closed = spent >= p.plan;
            let statusHtml = closed ? '<span class="status-closed">✅ Закрыто</span>' : 
                `<span class="status-loading"><span style="display:inline-block;width:10px;height:10px;border:2px solid #f59e0b;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;"></span> Осталось ${(p.plan - spent).toLocaleString()} ₽</span>`;
            html += `<tr><td class="category-name">${p.name}</td><td class="plan-amount">${p.plan.toLocaleString()} ₽</td><td class="actual-paid" style="color:${closed?'#10b981':'#f59e0b'}">${spent.toLocaleString()} ₽</td><td class="status">${statusHtml}</td><td><button class="edit-btn" onclick="editPlan('${p.name}', ${isMain})">✏️</button></td></tr>
            <tr><td colspan="5" style="padding-top:0"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percent}%"></div></div></td></tr>`;
        }
        document.getElementById(tbodyId).innerHTML = html;
    }
    
    function renderHistory() {
        let container = document.getElementById('historyList');
        if (!transactions.length) { container.innerHTML = '<div class="empty">📭 Нет операций</div>'; return; }
        let html = '';
        [...transactions].reverse().forEach(t => {
            let sign = t.type === 'income' ? '+' : '−';
            let color = t.type === 'income' ? '#10b981' : '#ef4444';
            html += `<div class="trans-item"><div><div class="trans-cat">${t.category}</div><div class="trans-date">📅 ${t.date} ${t.comment ? '• ' + t.comment : ''}</div></div><div><span class="trans-amt" style="color:${color}">${sign} ${t.amount.toLocaleString()} ₽</span> <button class="del-btn" data-id="${t.id}">🗑️</button></div></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.del-btn').forEach(btn => {
            btn.onclick = () => { transactions = transactions.filter(t => t.id != btn.dataset.id); saveAll(); render(); };
        });
    }
    
    function renderTotals() {
        let income = getTotalIncome(), expense = getTotalExpense(), bal = income - expense;
        document.getElementById('totalInc').innerHTML = income.toLocaleString() + ' ₽';
        document.getElementById('totalExp').innerHTML = expense.toLocaleString() + ' ₽';
        let balEl = document.getElementById('balance');
        balEl.innerHTML = bal.toLocaleString() + ' ₽';
        balEl.style.color = bal >= 0 ? '#c7f9cc' : '#fecaca';
    }
    
    function render() {
        renderTable(mainPlans, true, 'mainBody');
        renderTable(extraPlans, false, 'extraBody');
        renderHistory();
        renderTotals();
    }

    // ========== ДОБАВЛЕНИЕ ==========
    function addTransaction() {
        let date = document.getElementById('date').value || getToday();
        let amount = parseFloat(document.getElementById('amount').value);
        let category = document.getElementById('catSelect').value;
        let type = document.getElementById('type').value;
        let comment = document.getElementById('comment').value;
        if (isNaN(amount) || amount <= 0) { alert("❌ Введите сумму"); return; }
        if (category.includes("Зарплата") || category.includes("Дополнительный доход")) type = "income";
        else type = "expense";
        transactions.push({ id: Date.now(), date, amount, category, type, comment });
        saveAll();
        render();
        document.getElementById('amount').value = '';
        document.getElementById('comment').value = '';
    }

    // ========== EXCEL ==========
    function exportExcel() {
        if (typeof XLSX === 'undefined') { alert("Библиотека Excel не загружена. Проверьте интернет."); return; }
        let wb = XLSX.utils.book_new();
        let mainData = mainPlans.map(p => ({ "Категория": p.name, "План": p.plan, "Потрачено": getSpent(p.name), "Остаток": Math.max(0, p.plan - getSpent(p.name)) }));
        let extraData = extraPlans.map(p => ({ "Категория": p.name, "План": p.plan, "Потрачено": getSpent(p.name), "Остаток": Math.max(0, p.plan - getSpent(p.name)) }));
        let incData = transactions.filter(t => t.type === 'income').map(t => ({ "Дата": t.date, "Категория": t.category, "Сумма": t.amount }));
        let expData = transactions.filter(t => t.type === 'expense').map(t => ({ "Дата": t.date, "Категория": t.category, "Сумма": t.amount }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(mainData), "Основные");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(extraData), "Дополнительные");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(incData), "Доходы");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(expData), "Расходы");
        XLSX.writeFile(wb, `budget_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // ========== ГРАФИК ==========
    function showGraph() {
        if (typeof Chart === 'undefined') { alert("Библиотека Chart.js не загружена. Проверьте интернет."); return; }
        let modal = document.getElementById('modal');
        let modalBody = document.getElementById('modalBody');
        let days = {};
        transactions.forEach(t => {
            if (!days[t.date]) days[t.date] = { income: 0, expense: 0 };
            if (t.type === 'income') days[t.date].income += t.amount;
            else days[t.date].expense += t.amount;
        });
        let labels = Object.keys(days).sort();
        let incData = labels.map(l => days[l].income);
        let expData = labels.map(l => days[l].expense);
        
        let statsHtml = `<div class="stats-grid"><div class="stat-card"><div class="stat-value" style="color:#10b981">${getTotalIncome().toLocaleString()} ₽</div><div>💰 Доходы</div></div><div class="stat-card"><div class="stat-value" style="color:#ef4444">${getTotalExpense().toLocaleString()} ₽</div><div>📉 Расходы</div></div></div>`;
        modalBody.innerHTML = statsHtml + '<canvas id="dynChart"></canvas>';
        modal.style.display = 'block';
        setTimeout(() => {
            let ctx = document.getElementById('dynChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [
                    { label: '💰 Доходы', data: incData, borderColor: '#10b981', fill: true, tension: 0.3 },
                    { label: '📉 Расходы', data: expData, borderColor: '#ef4444', fill: true, tension: 0.3 }
                ]},
                options: { responsive: true, maintainAspectRatio: true }
            });
        }, 50);
    }

    // ========== СВОРАЧИВАНИЕ ==========
    function toggleExtra() {
        let container = document.getElementById('extraContainer');
        let btn = document.getElementById('collapseBtn');
        extraCollapsed = !extraCollapsed;
        container.classList.toggle('hidden', extraCollapsed);
        btn.innerHTML = extraCollapsed ? '▶ Развернуть' : '▼ Свернуть';
    }

    // ========== ОЧИСТКА ==========
    function clearAll() { if (confirm("❓ Удалить все операции?")) { transactions = []; saveAll(); render(); } }

    // ========== ЗАПУСК ==========
    document.getElementById('date').value = getToday();
    document.getElementById('addBtn').onclick = addTransaction;
    document.getElementById('clearBtn').onclick = clearAll;
    document.getElementById('excelBtn').onclick = exportExcel;
    document.getElementById('chartBtn').onclick = showGraph;
    document.getElementById('collapseBtn').onclick = toggleExtra;
    document.getElementById('closeModal').onclick = () => { document.getElementById('modal').style.display = 'none'; if(chart) chart.destroy(); };
    window.onclick = (e) => { if(e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
    window.editPlan = editPlan;
    
    // Добавляем анимацию спиннера
    let style = document.createElement('style');
    style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(style);
    
    loadAll();
</script>
</body>
</html>
